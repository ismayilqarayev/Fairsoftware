<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>citycard</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="citycard-page">
    <header class="citycard-header">
        <a class="citycard-logo" th:href="@{/}" aria-label="citycard əsas səhifə">
            <span class="citycard-logo-main">citycard</span>
            <span class="citycard-logo-sub">
                <span>by</span>
                <strong>payriff</strong>
            </span>
        </a>

        <nav class="citycard-nav" aria-label="Əsas naviqasiya">
            <a th:href="@{/}">Əsas səhifə</a>
            <a href="#privacy">Məxfilik Siyasəti</a>
            <a href="#contact">Əlaqə</a>
            <a href="#map">Xəritə</a>
        </nav>

        <button class="citycard-language" type="button" aria-label="Dil seçimi">
            <span>Az</span>
            <span class="citycard-chevron"></span>
        </button>
    </header>

    <main class="citycard-hero">
        <section class="citycard-hero-content" aria-labelledby="citycard-title">
            <h1 id="citycard-title">Ehtiyacınız olan hər şey, bir tətbiqdə</h1>
            <p>Sizin səyahətiniz, sizin pulqabınız, sizin nəzarətiniz.</p>
        </section>
    </main>
</body>
</html>
