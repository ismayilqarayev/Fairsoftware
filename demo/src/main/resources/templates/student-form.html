<!DOCTYPE html>
<html lang="az" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle}">Telebe</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <main class="page-shell narrow">
        <section class="topbar">
            <div>
                <p class="eyebrow">Student Management</p>
                <h1 th:text="${formTitle}">Yeni telebe</h1>
                <p class="subtitle">Telebe melumatlarini diqqetle doldur.</p>
            </div>
            <a class="button ghost" th:href="@{/}">Geri</a>
        </section>

        <form class="student-form" th:action="${action}" th:object="${student}" method="post">
            <label>
                Ad
                <input type="text" th:field="*{firstName}" placeholder="Ad" autocomplete="given-name" autofocus>
                <span class="error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
            </label>

            <label>
                Soyad
                <input type="text" th:field="*{lastName}" placeholder="Soyad" autocomplete="family-name">
                <span class="error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
            </label>

            <label>
                Email
                <input type="email" th:field="*{email}" placeholder="student@example.com" autocomplete="email">
                <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </label>

            <label>
                Telefon
                <input type="tel" th:field="*{phone}" placeholder="+994 50 000 00 00" autocomplete="tel">
                <span class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
            </label>

            <label>
                Ixtisas
                <input type="text" th:field="*{major}" placeholder="Software Engineering">
                <span class="error" th:if="${#fields.hasErrors('major')}" th:errors="*{major}"></span>
            </label>

            <label>
                Kurs
                <input type="number" min="1" max="6" th:field="*{year}">
                <span class="error" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></span>
            </label>

            <div class="form-actions">
                <button class="button primary" type="submit">Yadda saxla</button>
                <a class="button ghost" th:href="@{/}">Legv et</a>
            </div>
        </form>
    </main>
</body>
</html>
